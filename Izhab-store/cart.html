<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - IZHAB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="popup" class="popup">
     🎉 Order Placed Successfully!
    </div>

<!-- 🔗 Navigation -->
<div class="nav-links">
  <a href="index.html">🏠 Home</a>
</div>

<h1 class="page-title">My Cart 🛒</h1>

<!-- 🛒 Cart Items -->
<div id="cartItems" class="grid"></div>
<div class="summary">

  <p>Subtotal: ৳ <span id="subtotal">0</span></p>
  <p>Delivery: ৳ <span id="delivery">80</span></p>
  <h3>Total: ৳ <span id="total">0</span></h3>

</div>

<!-- 💳 Checkout Form -->
<div class="checkout-form">

  <h2>Checkout Details</h2>

  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="phone" placeholder="Phone Number">
  <textarea id="address" placeholder="Address"></textarea>

  <button onclick="checkout()">💳 Place Order</button>

</div>
<div class="payment-box">

  <h2>Payment Method</h2>

  <label>
    <input type="radio" name="payment" value="bkash"> bKash
  </label>

  <label>
    <input type="radio" name="payment" value="nagad"> Nagad
  </label>

  <p id="payNumber">Select method to see number</p>

  <input type="text" id="trx" placeholder="Transaction ID">

</div>

<!-- ⚙️ JS START (EIKHANE THAKBE 🔥) -->
<script>

// 🛒 Load Cart
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let container = document.getElementById("cartItems");

function loadCart(){
  container.innerHTML = "";

  cart.forEach((item, index) => {
    container.innerHTML += `
      <div class="card">
        <h3>${item.name}</h3>
        <p>৳ ${item.price}</p>

        <button onclick="removeCart(${index})">❌ Remove</button>
      </div>
    `;
  });
}
function loadCart(){
  container.innerHTML = "";

  let subtotal = 0;

  cart.forEach((item, index) => {
    subtotal += item.price;

    container.innerHTML += `
      <div class="card">
        <h3>${item.name}</h3>
        <p>৳ ${item.price}</p>
        <button onclick="removeCart(${index})">❌ Remove</button>
      </div>
    `;
  });

  // 💰 Calculate
  let delivery = 80;
  let total = subtotal + delivery;

  document.getElementById("subtotal").innerText = subtotal;
  document.getElementById("delivery").innerText = delivery;
  document.getElementById("total").innerText = total;
}
// ❌ Remove item
function removeCart(index){
  cart.splice(index,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

// 💳 Checkout
function checkout(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let paymentMethod = document.querySelector("input[name='payment']:checked");
let trx = document.getElementById("trx").value;

if(!paymentMethod){
  alert("Select payment method!");
  return;
}

if(!trx){
  alert("Enter transaction ID!");
  return;
}

  if(!name || !phone || !address){
    alert("Please fill all fields!");
    return;
  }

  if(cart.length === 0){
    alert("Cart is empty!");
    return;
  }

  // 🧾 MESSAGE BUILD
let message = "🛒 New Order - IZHAB\n\n";

cart.forEach(item => {
  message += item.name + " - ৳" + item.price + "\n";
});

message += "\n👤 Name: " + name;
message += "\n📞 Phone: " + phone;
message += "\n📍 Address: " + address;

// 🔥 EIKHANE ADD KORBI (ORDER SAVE)
let orders = JSON.parse(localStorage.getItem("orders")) || [];

orders.push({
  name: name,
  items: cart,
  date: new Date().toLocaleString()
});

localStorage.setItem("orders", JSON.stringify(orders));

// 📲 WhatsApp link
let url = "https://wa.me/8801604514341?text=" + encodeURIComponent(message);
  // 🎉 Show popup
  let popup = document.getElementById("popup");
  popup.style.display = "block";

  setTimeout(() => {
    popup.style.display = "none";
  }, 2000);

  // 📲 open WhatsApp
  window.open(url, "_blank");

  // 🧹 clear cart
  localStorage.removeItem("cart");
  cart = [];
  loadCart();
}

// 🔄 Load cart on page open
loadCart();
// change number based on method
document.querySelectorAll("input[name='payment']").forEach(radio => {
  radio.addEventListener("change", () => {

    let numberText = document.getElementById("payNumber");

    if(radio.value === "bkash"){
      numberText.innerText = "Send money to bKash: 01604514341";
    } else {
      numberText.innerText = "Send money to Nagad: 01604514341";
    }

  });
});
</script>

</body>
</html>
