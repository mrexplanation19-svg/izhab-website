<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <meta charset="UTF-8">
  <title>IZHAB</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔥 Intro Screen -->
<div id="intro">

  <h1 class="intro-logo">
    <span>I</span>
    <span>Z</span>
    <span>H</span>
    <span>A</span>
    <span>B</span>
  </h1>

</div>

<!-- 💻 Main Website -->
<div id="main-content" style="display:none;">

  <!-- Navbar -->
  <header class="navbar">

  <h1 class="logo">IZHAB</h1>

  <div class="nav-icons">
    <a href="wishlist.html">❤️ Wishlist (<span id="wishCount">0</span>)</a>
    <a href="cart.html">🛒 Cart (<span id="cartCount">0</span>)</a>
    <a href="account.html" id="accountLink">👤 Account</a>
  </div>

</header>

</header>

</header>

  <!-- 🎥 Video Banner -->
  <section class="video-banner">
    <video id="bgVideo" autoplay muted></video>
  </section>

  <!-- 🎯 Filter -->
  <div class="search-box">

  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search products...">
    <ul id="suggestions"></ul>
    <ul id="history"></ul>
  </div>

  <div class="filter">
    <button onclick="setCategory('all')">All</button>
    <button onclick="setCategory('men')">Men</button>
    <button onclick="setCategory('women')">Women</button>
  </div>

</div>

<p id="noResult" style="display:none; text-align:center; color:red;">
  ❌ No product found
</p>

  <!-- 🛍️ Products -->
  <section class="products">

    <div class="card" data-category="men">
      <img src="images/product1.jpg">
      <h3>Men Shirt</h3>
      <p>৳ 950</p>
      <button onclick="addToCart('Men Shirt',950)">Add to Cart</button>
      <button onclick="toggleWishlist(this, 'Men Shirt',950)">🤍</button>
    </div>

    <div class="card" data-category="women">
      <img src="images/product2.jpg">
      <h3>Women Dress</h3>
      <p>৳ 1200</p>
      <button onclick="addToCart('Women Dress',1200)">Add to Cart</button>
      <button onclick="toggleWishlist(this, 'Women Shirt',950)">🤍</button>
    </div>

  </section>

</div>

<script src="script.js"></script>
</body>
</html>
